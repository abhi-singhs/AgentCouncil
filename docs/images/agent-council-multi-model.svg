<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1014"/>
      <stop offset="1" stop-color="#0f1a1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#34b8ad" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34b8ad" stop-opacity="0"/>
    </radialGradient>
    <marker id="aMint" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#45c7bb"/>
    </marker>
    <marker id="aMute" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7d8b9a"/>
    </marker>
    <marker id="aGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#63e2b4"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- header -->
  <text x="70" y="92" fill="#45c7bb" font-size="22" font-weight="700" letter-spacing="3">AGENT COUNCIL</text>
  <text x="70" y="146" fill="#edf3fa" font-size="40" font-weight="700" letter-spacing="-0.5">Three models debate. One battle-tested answer.</text>

  <!-- N1: question -->
  <rect x="70" y="336" width="200" height="104" rx="18" fill="#151d27" stroke="#26323d" stroke-width="1.5"/>
  <text x="170" y="382" text-anchor="middle" fill="#edf3fa" font-size="24" font-weight="600">Your question</text>
  <text x="170" y="410" text-anchor="middle" fill="#9aa7b6" font-size="16">via Copilot CLI</text>

  <!-- arrow question -> council -->
  <line x1="270" y1="388" x2="314" y2="388" stroke="#7d8b9a" stroke-width="2.2" marker-end="url(#aMute)"/>

  <!-- COUNCIL container -->
  <rect x="318" y="232" width="554" height="344" rx="26" fill="#0e1820" stroke="#45c7bb" stroke-width="2" stroke-opacity="0.55"/>
  <text x="344" y="272" fill="#45c7bb" font-size="18" font-weight="700" letter-spacing="2.5">COUNCIL</text>
  <text x="344" y="296" fill="#9aa7b6" font-size="15">3 models read each other, then react · in parallel</text>

  <!-- mode chips -->
  <rect x="598" y="250" width="130" height="32" rx="10" fill="#12202a" stroke="#26323d" stroke-width="1.2"/>
  <text x="663" y="271" text-anchor="middle" fill="#cdd8e4" font-size="14">Collaborative</text>
  <rect x="736" y="250" width="116" height="32" rx="10" fill="#12202a" stroke="#26323d" stroke-width="1.2"/>
  <text x="794" y="271" text-anchor="middle" fill="#cdd8e4" font-size="14">Adversarial</text>

  <!-- cross-read cue (agents read each other) -->
  <path d="M350,340 C326,340 326,520 350,520" fill="none" stroke="#45c7bb" stroke-width="1.8" stroke-opacity="0.8" stroke-dasharray="5 5" marker-start="url(#aMint)" marker-end="url(#aMint)"/>

  <!-- agent: Claude -->
  <rect x="356" y="302" width="176" height="74" rx="16" fill="#151d27" stroke="#33424e" stroke-width="1.5"/>
  <circle cx="382" cy="339" r="6" fill="#d8825f"/>
  <text x="400" y="346" fill="#edf3fa" font-size="22" font-weight="600">Claude</text>
  <!-- agent: GPT -->
  <rect x="356" y="394" width="176" height="74" rx="16" fill="#151d27" stroke="#33424e" stroke-width="1.5"/>
  <circle cx="382" cy="431" r="6" fill="#19c39c"/>
  <text x="400" y="438" fill="#edf3fa" font-size="22" font-weight="600">GPT</text>
  <!-- agent: Gemini -->
  <rect x="356" y="486" width="176" height="74" rx="16" fill="#151d27" stroke="#33424e" stroke-width="1.5"/>
  <circle cx="382" cy="523" r="6" fill="#5a9bf5"/>
  <text x="400" y="530" fill="#edf3fa" font-size="22" font-weight="600">Gemini</text>

  <!-- converging arrows agents -> orchestrator -->
  <line x1="532" y1="339" x2="624" y2="420" stroke="#45c7bb" stroke-width="2.2" marker-end="url(#aMint)"/>
  <line x1="532" y1="431" x2="624" y2="434" stroke="#45c7bb" stroke-width="2.2" marker-end="url(#aMint)"/>
  <line x1="532" y1="523" x2="624" y2="448" stroke="#45c7bb" stroke-width="2.2" marker-end="url(#aMint)"/>

  <!-- orchestrator -->
  <rect x="628" y="390" width="200" height="88" rx="16" fill="#13231f" stroke="#45c7bb" stroke-width="1.6" stroke-opacity="0.6"/>
  <text x="728" y="428" text-anchor="middle" fill="#edf3fa" font-size="21" font-weight="600">Orchestrator</text>
  <text x="728" y="454" text-anchor="middle" fill="#9aa7b6" font-size="15">writes the synthesis</text>

  <!-- arrow council -> answer -->
  <line x1="872" y1="434" x2="1174" y2="434" stroke="#63e2b4" stroke-width="2.4" marker-end="url(#aGreen)"/>
  <text x="1023" y="416" text-anchor="middle" fill="#63e2b4" font-size="15" font-weight="600">synthesis</text>

  <!-- N3: answer -->
  <rect x="1178" y="378" width="252" height="112" rx="18" fill="#13231c" stroke="#63e2b4" stroke-width="1.6" stroke-opacity="0.7"/>
  <text x="1304" y="424" text-anchor="middle" fill="#d8fbe9" font-size="22" font-weight="600">Single, battle-tested</text>
  <text x="1304" y="452" text-anchor="middle" fill="#d8fbe9" font-size="22" font-weight="600">answer</text>

  <!-- bottom card: Collaborative -->
  <rect x="70" y="600" width="468" height="132" rx="18" fill="#151d27" stroke="#26323d" stroke-width="1.5"/>
  <text x="96" y="638" fill="#45c7bb" font-size="16" font-weight="700" letter-spacing="2">COLLABORATIVE</text>
  <text x="96" y="668" fill="#cdd8e4" font-size="16">Each model explores a different angle; the orchestrator</text>
  <text x="96" y="690" fill="#cdd8e4" font-size="16">writes a synthesis none could produce alone.</text>
  <text x="96" y="716" fill="#9aa7b6" font-size="14">7 subagent calls · 2 parallel rounds</text>

  <!-- bottom card: Adversarial -->
  <rect x="558" y="600" width="468" height="132" rx="18" fill="#151d27" stroke="#26323d" stroke-width="1.5"/>
  <text x="584" y="638" fill="#45c7bb" font-size="16" font-weight="700" letter-spacing="2">ADVERSARIAL</text>
  <text x="584" y="668" fill="#cdd8e4" font-size="16">The strongest position is attacked by the other two.</text>
  <text x="584" y="690" fill="#cdd8e4" font-size="16">The orchestrator returns a verdict:</text>
  <text x="584" y="716" fill="#9aa7b6" font-size="14">survived · modified · overturned   ·   6 subagent calls</text>

  <!-- bottom card: zero-dependency -->
  <rect x="1046" y="600" width="484" height="132" rx="18" fill="#0e1820" stroke="#26323d" stroke-width="1.3"/>
  <text x="1072" y="638" fill="#45c7bb" font-size="16" font-weight="700" letter-spacing="2">ZERO-DEPENDENCY</text>
  <text x="1072" y="668" fill="#cdd8e4" font-size="16">Just markdown files Copilot CLI reads: no build,</text>
  <text x="1072" y="690" fill="#cdd8e4" font-size="16">no runtime, no extra keys to manage.</text>
  <text x="1072" y="716" fill="#9aa7b6" font-size="14">Wall-clock ≈ two sequential calls, regardless of agent count.</text>
</svg>
